# Generated by Containerization Assist using AI
# Default values for photoalbum Helm chart.

# -- Number of replicas
replicaCount: 2

image:
  # -- Container image repository (update with your ACR)
  repository: <your-acr-name>.azurecr.io/photoalbum
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (overridden by CI/CD pipeline)
  tag: "latest"

# -- Image pull secrets for private registries (e.g., ACR)
imagePullSecrets: []
#  - name: acr-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a service account
  create: true
  # -- Annotations for the service account (e.g., Azure Workload Identity)
  annotations: {}
  #   azure.workload.identity/client-id: "<managed-identity-client-id>"
  # -- Service account name
  name: ""

# -- Pod-level annotations
podAnnotations: {}

# -- Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

# -- Container-level security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 80
  # -- Container target port
  targetPort: 8080

ingress:
  # -- Enable ingress
  enabled: true
  # -- Ingress class name
  className: "nginx"
  # -- Ingress annotations
  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: photoalbum.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: photoalbum-tls
  #    hosts:
  #      - photoalbum.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  # -- Enable Horizontal Pod Autoscaler
  enabled: true
  # -- Minimum replicas
  minReplicas: 2
  # -- Maximum replicas
  maxReplicas: 5
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 70
  # -- Target memory utilization percentage
  targetMemoryUtilizationPercentage: 80

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# -- Environment variables (non-sensitive)
env:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"

# -- Sensitive environment variables sourced from Kubernetes secrets
secretEnv:
  ConnectionStrings__DefaultConnection:
    secretName: photoalbum-secrets
    secretKey: db-connection-string

# Health probe configuration
healthCheck:
  # -- Liveness probe path
  livenessPath: /
  # -- Readiness probe path
  readinessPath: /
  # -- Initial delay before probes start (seconds)
  initialDelaySeconds: 15
  # -- Probe period (seconds)
  periodSeconds: 10
  # -- Probe timeout (seconds)
  timeoutSeconds: 5
  # -- Failure threshold
  failureThreshold: 3

# Persistent volume for uploads
persistence:
  # -- Enable persistent volume for photo uploads
  enabled: true
  # -- Storage class (use Azure Disk or Azure Files)
  storageClassName: "managed-csi"
  # -- Access mode
  accessMode: ReadWriteOnce
  # -- Volume size
  size: 5Gi
  # -- Mount path in container
  mountPath: /app/wwwroot/uploads
