# Generated by Containerization Assist using AI
# GitLab CI/CD pipeline for PhotoAlbum — deploys to existing AKS via Helm
# Authentication uses GitLab OIDC + Azure User-assigned Managed Identity (no stored secrets).
#
# Required GitLab CI/CD variables (Settings > CI/CD > Variables):
#   AZURE_CLIENT_ID          – Client ID of the User-assigned Managed Identity
#   AZURE_TENANT_ID          – Azure Tenant ID
#   AZURE_SUBSCRIPTION_ID    – Azure Subscription ID
#   ACR_NAME                 – Azure Container Registry name (without .azurecr.io)
#   AKS_CLUSTER_NAME_DEV           – AKS cluster name for dev
#   AKS_RESOURCE_GROUP_DEV         – Resource group for dev AKS cluster
#   AKS_CLUSTER_NAME_STAGING       – AKS cluster name for staging
#   AKS_RESOURCE_GROUP_STAGING     – Resource group for staging AKS cluster
#   AKS_CLUSTER_NAME_PRODUCTION    – AKS cluster name for production
#   AKS_RESOURCE_GROUP_PRODUCTION  – Resource group for production AKS cluster

stages:
  - build
  - test
  - deploy-dev
  - deploy-staging
  - deploy-production

# ---------------------------------------------------------------------------
# Shared configuration
# ---------------------------------------------------------------------------
variables:
  IMAGE_NAME: "$ACR_NAME.azurecr.io/photoalbum"
  HELM_CHART_PATH: "helm/photoalbum"
  K8S_NAMESPACE: "photoalbum"
  DOTNET_VERSION: "9.0"

# Reusable OIDC login snippet
.azure_login: &azure_login
  - |
    # Exchange GitLab OIDC token for an Azure access token (no stored secrets)
    export ARM_USE_OIDC=true
    az login \
      --service-principal \
      --username "$AZURE_CLIENT_ID" \
      --tenant "$AZURE_TENANT_ID" \
      --federated-token "$(cat $CI_JOB_JWT_V2_FILE 2>/dev/null || echo $CI_JOB_JWT_V2)" \
      --output none
    az account set --subscription "$AZURE_SUBSCRIPTION_ID"

# ---------------------------------------------------------------------------
# BUILD stage — compile, publish, build & push Docker image to ACR
# ---------------------------------------------------------------------------
build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  variables:
    GIT_DEPTH: 1
  script:
    - dotnet restore PhotoAlbum/PhotoAlbum.csproj
    - dotnet build PhotoAlbum/PhotoAlbum.csproj -c Release --no-restore
  artifacts:
    paths:
      - PhotoAlbum/bin/Release/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# ---------------------------------------------------------------------------
# TEST stage
# ---------------------------------------------------------------------------
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  needs: [build]
  script:
    - dotnet test PhotoAlbum.Tests/PhotoAlbum.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_ID

# ---------------------------------------------------------------------------
# Shared Docker build-and-push template
# ---------------------------------------------------------------------------
.docker_push:
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_BUILDKIT: "1"
  before_script:
    - apk add --no-cache azure-cli
    - *azure_login
    - az acr login --name "$ACR_NAME"
  script:
    - |
      docker build \
        -f PhotoAlbum/Dockerfile \
        -t "$IMAGE_NAME:$IMAGE_TAG" \
        -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" \
        --platform linux/amd64 \
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --build-arg VCS_REF="$CI_COMMIT_SHA" \
        .
      docker push "$IMAGE_NAME:$IMAGE_TAG"
      docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"

# ---------------------------------------------------------------------------
# Shared Helm deploy template
# ---------------------------------------------------------------------------
.helm_deploy:
  image:
    name: alpine/helm:3.16.0
    entrypoint: [""]
  before_script:
    - apk add --no-cache azure-cli kubectl
    - *azure_login
    - az aks get-credentials --resource-group "$AKS_RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --overwrite-existing
    - az acr login --name "$ACR_NAME"
    - kubectl create namespace "$K8S_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
  script:
    - |
      helm upgrade --install photoalbum "$HELM_CHART_PATH" \
        --namespace "$K8S_NAMESPACE" \
        --values "$HELM_CHART_PATH/values.yaml" \
        --values "$HELM_CHART_PATH/$HELM_VALUES_FILE" \
        --set image.tag="$IMAGE_TAG" \
        --set image.repository="$IMAGE_NAME" \
        --atomic \
        --timeout 5m \
        --wait

# ---------------------------------------------------------------------------
# DEPLOY — dev  (auto-deploys on every push to main)
# ---------------------------------------------------------------------------
docker-push-dev:
  extends: .docker_push
  stage: deploy-dev
  needs: [test]
  variables:
    IMAGE_TAG: "dev"
  environment:
    name: dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-dev:
  extends: .helm_deploy
  stage: deploy-dev
  needs: [docker-push-dev]
  variables:
    AKS_CLUSTER_NAME: $AKS_CLUSTER_NAME_DEV
    AKS_RESOURCE_GROUP: $AKS_RESOURCE_GROUP_DEV
    HELM_VALUES_FILE: "values-dev.yaml"
    IMAGE_TAG: "dev"
  environment:
    name: dev
    url: https://photoalbum-dev.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# DEPLOY — staging  (auto-deploys on every push to main, after dev succeeds)
# ---------------------------------------------------------------------------
docker-push-staging:
  extends: .docker_push
  stage: deploy-staging
  needs: [deploy-dev]
  variables:
    IMAGE_TAG: "staging"
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-staging:
  extends: .helm_deploy
  stage: deploy-staging
  needs: [docker-push-staging]
  variables:
    AKS_CLUSTER_NAME: $AKS_CLUSTER_NAME_STAGING
    AKS_RESOURCE_GROUP: $AKS_RESOURCE_GROUP_STAGING
    HELM_VALUES_FILE: "values-staging.yaml"
    IMAGE_TAG: "staging"
  environment:
    name: staging
    url: https://photoalbum-staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# DEPLOY — production  (manual gate — requires approval in GitLab)
# ---------------------------------------------------------------------------
docker-push-production:
  extends: .docker_push
  stage: deploy-production
  needs: [deploy-staging]
  variables:
    IMAGE_TAG: "latest"
  environment:
    name: production
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual

deploy-production:
  extends: .helm_deploy
  stage: deploy-production
  needs: [docker-push-production]
  variables:
    AKS_CLUSTER_NAME: $AKS_CLUSTER_NAME_PRODUCTION
    AKS_RESOURCE_GROUP: $AKS_RESOURCE_GROUP_PRODUCTION
    HELM_VALUES_FILE: "values-production.yaml"
    IMAGE_TAG: "latest"
  environment:
    name: production
    url: https://photoalbum.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
