# Generated by Containerization Assist using AI
# GitLab CI/CD Pipeline for PhotoAlbum - Deploy to Azure AKS with Helm
# Authenticates to Azure using OIDC with User-assigned Managed Identity

stages:
  - build
  - test
  - deploy-dev
  - deploy-staging
  - deploy-production

variables:
  DOCKER_IMAGE_NAME: photoalbum
  HELM_CHART_PATH: k8s/photoalbum
  HELM_RELEASE_NAME: photoalbum
  KUBERNETES_NAMESPACE: photoalbum
  DOTNET_VERSION: "9.0"

# ----- Build Stage -----
build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA -f PhotoAlbum/Dockerfile .
    - docker save $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA -o photoalbum-image.tar
  artifacts:
    paths:
      - photoalbum-image.tar
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

# ----- Test Stage -----
test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore PhotoAlbum.sln
    - dotnet build PhotoAlbum.sln --no-restore --configuration Release
    - dotnet test PhotoAlbum.Tests/PhotoAlbum.Tests.csproj --no-build --configuration Release --logger "junit;LogFilePath=test-results.xml"
  artifacts:
    when: always
    reports:
      junit: PhotoAlbum.Tests/test-results.xml
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_MERGE_REQUEST_IID

# ----- Azure Login Template -----
.azure_login: &azure_login
  id_tokens:
    AZURE_ID_TOKEN:
      aud: api://AzureADTokenExchange
  before_script:
    - az login --service-principal
        -u $AZURE_CLIENT_ID
        --tenant $AZURE_TENANT_ID
        --federated-token $AZURE_ID_TOKEN
    - az account set --subscription $AZURE_SUBSCRIPTION_ID

# ----- Helm Deploy Template -----
.helm_deploy:
  image: mcr.microsoft.com/azure-cli:latest
  <<: *azure_login
  script:
    # Install kubectl and Helm
    - az aks install-cli
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    # Load Docker image and push to ACR
    - docker load -i photoalbum-image.tar
    - az acr login --name $ACR_NAME
    - docker tag $DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA $ACR_NAME.azurecr.io/$DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA
    - docker push $ACR_NAME.azurecr.io/$DOCKER_IMAGE_NAME:$CI_COMMIT_SHORT_SHA

    # Get AKS credentials
    - az aks get-credentials --resource-group $AKS_RESOURCE_GROUP --name $AKS_CLUSTER_NAME --overwrite-existing

    # Deploy with Helm
    - |
      helm upgrade --install $HELM_RELEASE_NAME $HELM_CHART_PATH \
        --namespace $KUBERNETES_NAMESPACE \
        --create-namespace \
        --set image.repository=$ACR_NAME.azurecr.io/$DOCKER_IMAGE_NAME \
        --set image.tag=$CI_COMMIT_SHORT_SHA \
        --wait \
        --timeout 5m

    # Verify deployment
    - kubectl rollout status deployment/$HELM_RELEASE_NAME-photoalbum -n $KUBERNETES_NAMESPACE --timeout=300s

# ----- Deploy to Dev -----
deploy-dev:
  extends: .helm_deploy
  stage: deploy-dev
  services:
    - docker:27-dind
  dependencies:
    - build
  environment:
    name: dev
    url: https://photoalbum-dev.example.com
  variables:
    ACR_NAME: $DEV_ACR_NAME
    AKS_RESOURCE_GROUP: $DEV_AKS_RESOURCE_GROUP
    AKS_CLUSTER_NAME: $DEV_AKS_CLUSTER_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^develop/

# ----- Deploy to Staging -----
deploy-staging:
  extends: .helm_deploy
  stage: deploy-staging
  services:
    - docker:27-dind
  dependencies:
    - build
  needs:
    - job: deploy-dev
      optional: false
  environment:
    name: staging
    url: https://photoalbum-staging.example.com
  variables:
    ACR_NAME: $STAGING_ACR_NAME
    AKS_RESOURCE_GROUP: $STAGING_AKS_RESOURCE_GROUP
    AKS_CLUSTER_NAME: $STAGING_AKS_CLUSTER_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ----- Deploy to Production -----
deploy-production:
  extends: .helm_deploy
  stage: deploy-production
  services:
    - docker:27-dind
  dependencies:
    - build
  needs:
    - job: deploy-staging
      optional: false
  environment:
    name: production
    url: https://photoalbum.example.com
  variables:
    ACR_NAME: $PROD_ACR_NAME
    AKS_RESOURCE_GROUP: $PROD_AKS_RESOURCE_GROUP
    AKS_CLUSTER_NAME: $PROD_AKS_CLUSTER_NAME
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: false
