# Generated by Containerization Assist using AI
# Overrides for the 'staging' environment — applied on top of values.yaml
replicaCount: 2

image:
  repository: <ACR_NAME>.azurecr.io/photoalbum
  tag: "staging"

env:
  ASPNETCORE_ENVIRONMENT: "Staging"

ingress:
  enabled: true
  hosts:
    - host: photoalbum-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: photoalbum-staging-tls
      hosts:
        - photoalbum-staging.example.com

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
