# Generated by Containerization Assist using AI
# Overrides for the 'production' environment — applied on top of values.yaml
replicaCount: 3

image:
  repository: <ACR_NAME>.azurecr.io/photoalbum
  tag: "latest"

env:
  ASPNETCORE_ENVIRONMENT: "Production"

ingress:
  enabled: true
  hosts:
    - host: photoalbum.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: photoalbum-tls
      hosts:
        - photoalbum.example.com

resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75
